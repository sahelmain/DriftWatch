databases:
  - name: driftwatch-db
    plan: basic-256mb
    databaseName: driftwatch
    user: driftwatch
    ipAllowList: []

services:
  - type: web
    name: driftwatch-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    preDeployCommand: python -m pip install -r backend/requirements.txt && cd backend && alembic upgrade head
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: driftwatch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftwatch-redis
          type: keyvalue
          property: connectionString
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: ENABLE_INLINE_SCHEDULER
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://driftwatch.vercel.app"]'
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL_PRICING_JSON
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: worker
    name: driftwatch-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: celery -A worker.runner.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driftwatch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftwatch-redis
          type: keyvalue
          property: connectionString
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL_PRICING_JSON
        sync: false

  - type: cron
    name: driftwatch-scheduler
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    schedule: "*/5 * * * *"
    dockerCommand: python -m app.scheduler_cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driftwatch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: driftwatch-redis
          type: keyvalue
          property: connectionString
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SENTRY_DSN
        sync: false
  - type: keyvalue
    name: driftwatch-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
