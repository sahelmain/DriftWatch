databases:
  - name: driftwatch-db-free
    plan: free
    databaseName: driftwatch
    user: driftwatch
    ipAllowList: []

services:
  - type: web
    name: driftwatch-api-free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: driftwatch-db-free
          property: connectionString
      - key: AUTO_CREATE_SCHEMA
        value: "true"
      - key: ENABLE_INLINE_SCHEDULER
        value: "false"
      - key: ENABLE_INLINE_RUNS
        value: "true"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","http://localhost:5173","https://driftwatch.vercel.app","https://driftwatch-eight.vercel.app"]'
      - key: SENTRY_DSN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: "https://generativelanguage.googleapis.com/v1beta/openai/"
      - key: GEMINI_RPM
        value: "10"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LLM_MODEL_PRICING_JSON
        sync: false
      - key: ENVIRONMENT
        value: production
